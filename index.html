<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Arman Afrasiyabi, Ph.D. — Assistant Professor in the Department of Neurosurgery at Yale and AI scientist.">
  <title>Arman Afrasiyabi, Ph.D.</title>

  <style>
    :root {
      --text: #151515;
      --muted: #5f6368;
      --accent: #00356b;
      --background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--background);
      text-align: center;
    }

    main {
      width: 100%;
      max-width: 860px;
      transform: translateY(-66px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.035em;
      line-height: 1.1;
    }

    h1 strong {
      font-weight: 700;
    }

    .title {
      margin: 0 auto;
      max-width: 780px;
      font-size: clamp(0.88rem, 1.7vw, 1.08rem);
      font-weight: 400;
      line-height: 1.5;
      color: var(--muted);
    }


    .position-line {
      display: block;
      white-space: nowrap;
      font-size: clamp(0.72rem, 2.6vw, 1.12rem);
      letter-spacing: -0.015em;
    }

    .specialty-line {
      display: block;
      margin-top: 2px;
      font-size: clamp(0.76rem, 1.5vw, 0.94rem);
    }

    @media (max-width: 420px) {
      body {
        padding-left: 8px;
        padding-right: 8px;
      }

      main {
        transform: translateY(-62px);
      }
    }

    .contact {
      margin-top: 18px;
    }

    .email {
      color: var(--accent);
      font-size: 0.9rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .email:hover,
    .email:focus {
      border-bottom-color: var(--accent);
    }

    .links {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
    }

    .links a {
      color: var(--muted);
      font-size: 0.84rem;
      text-decoration: none;
    }

    .links a:hover,
    .links a:focus {
      color: var(--accent);
    }
  </style>
</head>

<body>
  <main>
    <h1><strong>Arman</strong> Afrasiyabi, Ph.D.</h1>

    <p class="title">
      <span class="position-line">Assistant Professor in the Department of Neurosurgery at Yale</span>
      <span class="specialty-line">AI Scientist and Engineer</span>
    </p>

    <div class="contact">
      <a class="email" href="mailto:arman.afrasiyabi@yale.edu">
        arman.afrasiyabi@yale.edu
      </a>
    </div>

    <nav class="links" aria-label="Professional profiles">
      <!-- <a href="https://medicine.yale.edu/profile/arman-afrasiyabi/" target="_blank" rel="noopener noreferrer">Yale Profile</a> -->
      <a href="https://scholar.google.com/citations?hl=en&amp;user=eLmbCr8AAAAJ&amp;view_op=list_works&amp;sortby=pubdate" target="_blank" rel="noopener noreferrer">Google Scholar</a>
      <a href="https://www.linkedin.com/in/arman-afrasiyabi-40b48810b/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://github.com/armanafrasiyabi" target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>
  </main>
</body>
</html>
