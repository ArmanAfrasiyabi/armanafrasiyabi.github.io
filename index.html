<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Arman Afrasiyabi, Ph.D. — Assistant Professor at Yale University and AI scientist and engineer.">
  <title>Arman Afrasiyabi, Ph.D.</title>

  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Arman Afrasiyabi">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    :root {
      --text: #151515;
      --muted: #5f6368;
      --accent: #00356b;
      --background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 6px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--background);
      text-align: center;
    }

    main {
      width: 100%;
      max-width: 860px;
      transform: translateY(-74px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.035em;
      line-height: 1.1;
      white-space: nowrap;
    }

    h1 strong {
      font-weight: 700;
    }

    .title {
      width: 100%;
      margin: 0 auto;
      font-weight: 400;
      line-height: 1.5;
      color: var(--muted);
    }

    .position-wrapper {
      width: 100%;
      padding: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .position-line {
      display: inline-block;
      max-width: none;
      font-size: 1.22rem;
      line-height: 1.3;
      letter-spacing: -0.025em;
      white-space: nowrap;
      transform-origin: center center;
    }

    .specialty-line {
      display: block;
      margin-top: -2px;
      font-size: clamp(0.62rem, 1.7vw, 0.76rem);
      letter-spacing: -0.005em;
      white-space: nowrap;
    }

    .contact {
      margin-top: 18px;
    }

    .email {
      color: var(--accent);
      font-size: 0.9rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .email:hover,
    .email:focus {
      border-bottom-color: var(--accent);
    }

    .links {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .links a {
      color: var(--muted);
      font-size: 0.68rem;
      line-height: 1;
      letter-spacing: -0.01em;
      text-decoration: none;
      white-space: nowrap;
    }

    .links a:hover,
    .links a:focus {
      color: var(--accent);
    }

    @media (max-width: 420px) {
      main {
        transform: translateY(-70px);
      }

      h1 {
        font-size: clamp(1.05rem, 5.1vw, 1.35rem);
      }

      .specialty-line {
        font-size: clamp(0.58rem, 2.6vw, 0.68rem);
      }

      .email {
        font-size: 0.84rem;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1><strong>Arman Afrasiyabi</strong>, Ph.D.</h1>

    <div class="title">
      <div class="position-wrapper">
        <span class="position-line" id="positionLine">
          Assistant Professor at Yale University — AI Scientist &amp ML Engineer
        </span>
      </div>

      <span class="specialty-line">
        Developing Brain Foundation Models &amp; Neural Decoding Methods

    </div>

    <div class="contact">
      <a class="email" href="mailto:arman.afrasiyabi@yale.edu">

    </div>

    <nav class="links" aria-label="Professional profiles">

         target="_blank"

      <a href="https://www.linkedin.com/in/arman-afrasiyabi-40b48810b/"

  </main>

  <script>
    function fitPositionLine() {
      const line = document.getElementById("positionLine");
      const wrapper = line.parentElement;

      const maxSize = 19.52;
      const minSize = 9;
      const availableWidth = wrapper.clientWidth - 2;

      line.style.fontSize = maxSize + "px";

      let low = minSize;
      let high = maxSize;
      let best = minSize;

      while (high - low > 0.1) {
        const middle = (low + high) / 2;
        line.style.fontSize = middle + "px";

        if (line.scrollWidth <= availableWidth) {
          best = middle;
          low = middle;
        } else {
          high = middle;
        }
      }

      line.style.fontSize = best + "px";
    }

    window.addEventListener("load", fitPositionLine);
    window.addEventListener("resize", fitPositionLine);
    window.addEventListener("orientationchange", fitPositionLine);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitPositionLine);
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
