<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Arman Afrasiyabi, Ph.D. — Assistant Professor at Yale University and AI scientist and engineer.">
  <title>Arman Afrasiyabi, Ph.D.</title>

  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Arman Afrasiyabi">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    :root {
      --text: #151515;
      --muted: #5f6368;
      --accent: #00356b;
      --background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--background);
      text-align: center;
    }

    main {
      width: 100%;
      max-width: min(860px, calc(100vw - 24px));
      transform: translateY(-74px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.035em;
      line-height: 1.1;
    }

    h1 strong {
      font-weight: 700;
    }

    .title {
      margin: 0 auto;
      max-width: 780px;
      font-size: clamp(0.88rem, 1.7vw, 1.08rem);
      font-weight: 400;
      line-height: 1.5;
      color: var(--muted);
    }

    .position-line {
      display: block;
      max-width: 100%;
      font-size: clamp(0.72rem, 2.6vw, 1.12rem);
      letter-spacing: -0.015em;
      overflow-wrap: anywhere;
    }

    .specialty-line {
      display: block;
      margin-top: 2px;
      font-size: clamp(0.62rem, 1.05vw, 0.76rem);
      letter-spacing: -0.005em;
    }

    .contact {
      margin-top: 18px;
    }

    .email {
      color: var(--accent);
      font-size: 0.9rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .email:hover,
    .email:focus {
      border-bottom-color: var(--accent);
    }

    .links {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .links a {
      color: var(--muted);
      font-size: 0.68rem;
      line-height: 1;
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .links a:hover,
    .links a:focus {
      color: var(--accent);
    }

    @media (max-width: 420px) {
      body {
        padding-left: 8px;
        padding-right: 8px;
      }

      main {
        max-width: calc(100vw - 16px);
        transform: translateY(-70px);
      }

      .position-line {
        white-space: normal;
        line-height: 1.45;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1><strong>Arman</strong> Afrasiyabi, Ph.D.</h1>

    <p class="title">
      <span class="position-line">Assistant Professor at Yale — AI Scientist and Engineer</span>
      <span class="specialty-line">Developing Foundation Models &amp; Neural Decoding Methods</span>
    </p>

    <div class="contact">
      <a class="email" href="mailto:arman.afrasiyabi@yale.edu">
        arman.afrasiyabi@yale.edu
      </a>
    </div>

    <nav class="links" aria-label="Professional profiles">
      <!--
      <a href="https://medicine.yale.edu/profile/arman-afrasiyabi/"
         target="_blank"
         rel="noopener noreferrer">
        Yale Profile
      </a>
      -->

      <a href="https://scholar.google.com/citations?hl=en&amp;user=eLmbCr8AAAAJ&amp;view_op=list_works&amp;sortby=pubdate"
         target="_blank"
         rel="noopener noreferrer">
        Google Scholar
      </a>

      <a href="https://www.linkedin.com/in/arman-afrasiyabi-40b48810b/"
         target="_blank"
         rel="noopener noreferrer">
        LinkedIn
      </a>

      <a href="https://github.com/armanafrasiyabi"
         target="_blank"
         rel="noopener noreferrer">
        GitHub
      </a>
    </nav>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
